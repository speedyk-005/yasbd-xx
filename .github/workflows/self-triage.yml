name: Self-triage

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  models: read
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: qte77/gha-issue-triage@4a07dd23bdd6bafc625bce6430f0aa5990fc327d  # v0.3.0
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
